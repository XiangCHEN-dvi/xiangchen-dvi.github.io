{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button class="greedy-nav__toggle" type="button"><span class="navicon"></span></button>
        <div id="lang-toggle" class="lang-toggle">
          <div class="lang-switch" role="group" aria-label="Switch language">
            <button type="button" class="lang-switch__btn" data-lang="en">EN</button>
            <button type="button" class="lang-switch__btn" data-lang="zh">中</button>
          </div>
        </div>
        <ul class="visible-links">
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item{% if link.persist %} persist{% endif %}"><a href="{{ domain }}{{ link.url }}" data-title-en="{{ link.title }}" data-title-zh="{{ link.title_zh | default: link.title }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
